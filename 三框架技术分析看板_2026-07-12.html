<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>三框架技术分析看板</title>
<style>
:root{--bg:#090d14;--panel:#111722;--panel2:#161e2b;--line:#263246;--text:#edf2f8;--muted:#8c98aa;--gold:#c9af75;--red:#ef7479;--green:#56c99c;--amber:#d7b66d}*{box-sizing:border-box;font-family:"KaiTi","STKaiti","楷体",serif}body{margin:0;background:radial-gradient(circle at 10% 0,#182337 0,transparent 34%),var(--bg);color:var(--text)}.app{width:min(1500px,calc(100% - 40px));margin:auto;padding:32px 0 60px}.top{display:flex;justify-content:space-between;align-items:end;margin-bottom:22px}.top h1{font-size:38px;margin:0 0 7px;letter-spacing:.05em}.top p,.date{color:var(--muted);margin:0;font-size:13px}.date{text-align:right;line-height:1.7}.date b{display:block;color:var(--gold);font-size:20px}.tabs{display:flex;gap:8px;margin:18px 0}.tab,.subtab,.asset-btn{border:1px solid var(--line);background:#0e141e;color:var(--muted);cursor:pointer;transition:.18s}.tab{padding:11px 23px;border-radius:9px;font-size:14px}.tab.active,.subtab.active{background:var(--gold);border-color:var(--gold);color:#11151c;font-weight:700}.sheet.hidden{display:none}.panel{background:linear-gradient(145deg,#121925,#0e141d);border:1px solid var(--line);border-radius:14px;overflow:hidden}.bar{padding:14px 17px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}.subtabs{display:flex;gap:7px}.subtab{padding:8px 16px;border-radius:7px}.hint{font-size:12px;color:var(--muted)}.table-wrap{overflow:auto}.score-table{width:100%;border-collapse:collapse;min-width:1050px;table-layout:fixed}.score-table th{height:45px;background:#151e2b;color:#9ba8ba;font-size:13px;border-bottom:1px solid #334159}.score-table td{height:55px;text-align:center;border-bottom:1px solid var(--line);font-size:13px;padding:8px}.score-table tr:last-child td{border-bottom:0}.score-table tbody tr:hover{background:#17202d}.asset{text-align:left!important;padding-left:18px!important}.asset b{display:block;font-size:15px}.asset small{color:var(--muted);font-size:10px}.price{font-weight:700;font-size:15px!important}.score{font-size:17px!important;font-weight:700}.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--amber)}.pill{display:inline-block;min-width:76px;padding:6px 9px;border-radius:7px;font-weight:700}.pill.pos{background:#163a31}.pill.neg{background:#412329}.pill.neu{background:#393221}.summary{text-align:left!important;color:var(--muted);line-height:1.5}.method-head{color:var(--gold)!important}.chart-layout{display:grid;grid-template-columns:190px 1fr;min-height:720px}.asset-list{border-right:1px solid var(--line);padding:12px;display:flex;flex-direction:column;gap:5px}.asset-btn{text-align:left;padding:10px 12px;border-radius:7px;font-size:13px}.asset-btn.active{background:#202a39;color:var(--text);border-color:#53647c}.chart-main{padding:18px}.chart-header{display:grid;grid-template-columns:1fr repeat(3,145px);gap:10px;margin-bottom:12px}.chart-title,.metric{background:#0d131c;border:1px solid var(--line);border-radius:10px;padding:12px 15px}.chart-title h2{margin:0 0 5px;font-size:21px}.chart-title p,.metric span{margin:0;color:var(--muted);font-size:11px}.metric b{display:block;font-size:18px;margin-top:5px}.stage{background:#090e15;border:1px solid var(--line);border-radius:11px;padding:8px}.stage svg{width:100%;height:auto;display:block;min-height:410px}.grid{stroke:#1d2735}.axis{fill:#748196;font-size:10px}.support{stroke:var(--green);stroke-width:1.5;stroke-dasharray:7 5}.resist{stroke:var(--red);stroke-width:1.5;stroke-dasharray:7 5}.analysis-toolbar{display:flex;justify-content:space-between;align-items:center;margin:15px 0 9px}.analysis-toolbar h3{margin:0;font-size:16px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.card{background:#0e141d;border:1px solid var(--line);border-radius:10px;padding:13px}.card h4{margin:0 0 7px;color:var(--gold);font-size:14px}.card p{margin:0;color:var(--muted);font-size:12px;line-height:1.65}.conclusion{margin-top:9px;padding:13px 15px;border-left:3px solid var(--gold);background:#151b24;color:#c7d0dc;font-size:13px;line-height:1.6}.foot{margin-top:14px;color:#707d90;font-size:11px;line-height:1.7}@media(max-width:900px){.chart-layout{grid-template-columns:1fr}.asset-list{border-right:0;border-bottom:1px solid var(--line);flex-direction:row;overflow:auto}.asset-btn{white-space:nowrap}.chart-header{grid-template-columns:1fr 1fr 1fr}.chart-title{grid-column:1/-1}.cards{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column;gap:10px}.date{text-align:left}}@media(max-width:600px){.app{width:calc(100% - 20px);padding-top:20px}.top h1{font-size:29px}.bar{align-items:flex-start;flex-direction:column}.chart-main{padding:10px}}
.chart-controls{display:flex;justify-content:space-between;align-items:center;margin:10px 0}.ma-legend{display:flex;gap:14px;color:var(--muted);font-size:11px}.ma-legend i{display:inline-block;width:16px;height:2px;margin-right:5px;vertical-align:middle}@media(max-width:600px){.chart-controls{align-items:flex-start;flex-direction:column;gap:8px}}
</style></head><body><main class="app"><header class="top"><div><h1>三框架 · 多周期技术分析</h1><p>缠论 × 蔡森《多空转折一手抓》× 道氏理论</p></div><div class="date"><b>2026-07-12</b>行情截至 2026-07-10 · 主连日线</div></header>
<nav class="tabs"><button class="tab active" data-sheet="scoreSheet">框架评分总览</button><button class="tab" data-sheet="chartSheet">K线图与品种分析</button></nav>
<section id="scoreSheet" class="sheet panel"><div class="bar"><div id="scoreTabs" class="subtabs"><button class="subtab active" data-period="一周">一周</button><button class="subtab" data-period="一个月">一个月</button><button class="subtab" data-period="一季度">一季度</button></div><span class="hint">评分范围 −100（强空）至 +100（强多）</span></div><div id="scoreTable" class="table-wrap"></div></section>
<section id="chartSheet" class="sheet panel hidden"><div class="chart-layout"><aside id="assetList" class="asset-list"></aside><div class="chart-main"><div id="chartHeader" class="chart-header"></div><div class="chart-controls"><div id="tfTabs" class="subtabs"><button class="subtab active" data-tf="D">日K</button><button class="subtab" data-tf="W">周K</button><button class="subtab" data-tf="M">月K</button></div><div class="ma-legend"><span><i style="background:#d7b66d"></i>MA5</span><span><i style="background:#6fa8dc"></i>MA10</span><span><i style="background:#b084cc"></i>MA20</span></div></div><div id="stage" class="stage"></div><div class="analysis-toolbar"><h3>三框架结构分析</h3><div id="analysisTabs" class="subtabs"><button class="subtab active" data-ap="一周">一周</button><button class="subtab" data-ap="一个月">一月</button><button class="subtab" data-ap="一季度">一季度</button></div></div><div id="analysisCards" class="cards"></div><div id="conclusion" class="conclusion"></div></div></div></section>
<div class="foot">说明：评分为三套方法论的可复核量化近似；支撑与压力来自近期确认分型高低点。连续合约换月可能产生价格跳空，本页面仅作技术研究，不构成投资建议。</div></main>
<script src="updated_analysis_data.js"></script><script>
const D=window.ANALYSIS_DATA;let scorePeriod='一周',current=D[0],analysisPeriod='一周',chartTF='D',chartContext=null;const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);const fmt=v=>Number(v).toLocaleString('zh-CN',{maximumFractionDigits:2});const cls=v=>v>=15?'pos':v<=-15?'neg':'neu';
function renderScores(){const rows=[...D].sort((a,b)=>b.periods[scorePeriod].score-a.periods[scorePeriod].score).map(x=>{const p=x.periods[scorePeriod];return `<tr><td class="asset"><b>${x.name}</b><small>${x.code}</small></td><td class="price">${fmt(x.close)}</td><td class="score ${cls(p.chan)}">${p.chan>0?'+':''}${p.chan}</td><td class="score ${cls(p.tsai)}">${p.tsai>0?'+':''}${p.tsai}</td><td class="score ${cls(p.dow)}">${p.dow>0?'+':''}${p.dow}</td><td class="score ${cls(p.score)}">${p.score>0?'+':''}${p.score}</td><td><span class="pill ${cls(p.score)}">${p.direction}</span></td><td class="summary">${x.analysis}</td></tr>`}).join('');$('#scoreTable').innerHTML=`<table class="score-table"><colgroup><col style="width:145px"><col style="width:105px"><col style="width:90px"><col style="width:100px"><col style="width:90px"><col style="width:90px"><col style="width:110px"><col></colgroup><thead><tr><th>品种</th><th>最新收盘</th><th class="method-head">缠论</th><th class="method-head">蔡森体系</th><th class="method-head">道氏理论</th><th>综合分</th><th>方向</th><th>跨周期研判</th></tr></thead><tbody>${rows}</tbody></table>`}
$('#scoreTabs').onclick=e=>{if(!e.target.dataset.period)return;scorePeriod=e.target.dataset.period;$('#scoreTabs').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b===e.target));renderScores()};
$$('.tab').forEach(b=>b.onclick=()=>{$$('.tab').forEach(x=>x.classList.remove('active'));$$('.sheet').forEach(x=>x.classList.add('hidden'));b.classList.add('active');$('#'+b.dataset.sheet).classList.remove('hidden')});
$('#assetList').innerHTML=D.map((x,i)=>`<button class="asset-btn${i===0?' active':''}" data-code="${x.code}">${x.name}</button>`).join('');$('#assetList').onclick=e=>{const x=D.find(z=>z.code===e.target.dataset.code);if(!x)return;current=x;$$('.asset-btn').forEach(b=>b.classList.toggle('active',b===e.target));renderChart()};
function renderChart(){const bars=current.bars.slice(-90),W=1220,H=470,p={l:55,r:80,t:25,b:38},vals=bars.flatMap(x=>[x[2],x[3]]).concat([current.support,current.resistance]),lo=Math.min(...vals),hi=Math.max(...vals),rg=hi-lo||1,y=v=>p.t+(hi-v)/rg*(H-p.t-p.b),step=(W-p.l-p.r)/bars.length,cw=Math.max(2,step*.55);let s=`<svg viewBox="0 0 ${W} ${H}">`;for(let i=0;i<6;i++){let yy=p.t+i*(H-p.t-p.b)/5,v=hi-i*rg/5;s+=`<line class="grid" x1="${p.l}" y1="${yy}" x2="${W-p.r}" y2="${yy}"/><text class="axis" x="${W-p.r+8}" y="${yy+4}">${fmt(v)}</text>`}bars.forEach((b,i)=>{let x=p.l+(i+.5)*step,up=b[4]>=b[1],co=up?'#ef7479':'#56c99c',t=y(Math.max(b[1],b[4])),bt=y(Math.min(b[1],b[4]));s+=`<line x1="${x}" y1="${y(b[2])}" x2="${x}" y2="${y(b[3])}" stroke="${co}"/><rect x="${x-cw/2}" y="${t}" width="${cw}" height="${Math.max(1,bt-t)}" fill="${up?co:'transparent'}" stroke="${co}"/>`;if(i%15===0)s+=`<text class="axis" x="${x}" y="${H-12}" text-anchor="middle">${b[0].slice(5)}</text>`});[[current.support,'support','支撑'],[current.resistance,'resist','压力']].forEach(q=>{s+=`<line class="${q[1]}" x1="${p.l}" y1="${y(q[0])}" x2="${W-p.r}" y2="${y(q[0])}"/><text x="${p.l+6}" y="${y(q[0])-6}" fill="${q[1]==='support'?'#56c99c':'#ef7479'}" font-size="11">${q[2]} ${fmt(q[0])}</text>`});$('#stage').innerHTML=s+'</svg>';$('#chartHeader').innerHTML=`<div class="chart-title"><h2>${current.name} · 日K线</h2><p>${current.code}｜最近90个交易日</p></div><div class="metric"><span>最新收盘</span><b>${fmt(current.close)}</b></div><div class="metric"><span>支撑位</span><b class="pos">${fmt(current.support)}</b></div><div class="metric"><span>压力位</span><b class="neg">${fmt(current.resistance)}</b></div>`;renderAnalysis()}
function aggregateBars(raw,tf){if(tf==='D')return raw;const m=new Map;raw.forEach(b=>{const d=new Date(b[0]+'T00:00:00');let k;if(tf==='M')k=b[0].slice(0,7);else{const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);k=d.toISOString().slice(0,10)}if(!m.has(k))m.set(k,[b[0],b[1],b[2],b[3],b[4],b[5]||0]);else{const x=m.get(k);x[2]=Math.max(x[2],b[2]);x[3]=Math.min(x[3],b[3]);x[4]=b[4];x[5]+=(b[5]||0);x[0]=b[0]}});return [...m.values()]}
function ma(arr,n){return arr.map((_,i)=>i<n-1?null:arr.slice(i-n+1,i+1).reduce((a,b)=>a+b,0)/n)}
function chartLevels(bars){const cur=bars.at(-1)[4],lo=[],hi=[];for(let i=2;i<bars.length-2;i++){if(bars[i][3]<=Math.min(...bars.slice(i-2,i+3).map(x=>x[3])))lo.push(bars[i][3]);if(bars[i][2]>=Math.max(...bars.slice(i-2,i+3).map(x=>x[2])))hi.push(bars[i][2])}return {support:[...lo].reverse().find(x=>x<cur)??Math.min(...bars.slice(-20).map(x=>x[3])),resistance:[...hi].reverse().find(x=>x>cur)??Math.max(...bars.slice(-20).map(x=>x[2]))}}
function renderChart(){const all=aggregateBars(current.bars,chartTF),limit=chartTF==='D'?130:chartTF==='W'?104:60,bars=all.slice(-limit),W=1220,H=470,p={l:55,r:80,t:25,b:38},lv=chartLevels(bars),close=bars.map(x=>x[4]),mas=[[ma(close,5),'#d7b66d'],[ma(close,10),'#6fa8dc'],[ma(close,20),'#b084cc']],vals=bars.flatMap(x=>[x[2],x[3]]).concat([lv.support,lv.resistance]),lo=Math.min(...vals),hi=Math.max(...vals),rg=hi-lo||1,y=v=>p.t+(hi-v)/rg*(H-p.t-p.b),step=(W-p.l-p.r)/bars.length,cw=Math.max(2,step*.55);let s=`<svg viewBox="0 0 ${W} ${H}">`;for(let i=0;i<6;i++){let yy=p.t+i*(H-p.t-p.b)/5,v=hi-i*rg/5;s+=`<line class="grid" x1="${p.l}" y1="${yy}" x2="${W-p.r}" y2="${yy}"/><text class="axis" x="${W-p.r+8}" y="${yy+4}">${fmt(v)}</text>`}bars.forEach((b,i)=>{let x=p.l+(i+.5)*step,up=b[4]>=b[1],co=up?'#ef7479':'#56c99c',t=y(Math.max(b[1],b[4])),bt=y(Math.min(b[1],b[4]));s+=`<line x1="${x}" y1="${y(b[2])}" x2="${x}" y2="${y(b[3])}" stroke="${co}"/><rect x="${x-cw/2}" y="${t}" width="${cw}" height="${Math.max(1,bt-t)}" fill="${up?co:'transparent'}" stroke="${co}"/>`;if(i%Math.ceil(bars.length/7)===0)s+=`<text class="axis" x="${x}" y="${H-12}" text-anchor="middle">${chartTF==='M'?b[0].slice(0,7):b[0].slice(5)}</text>`});mas.forEach(([a,color])=>{let pts=a.map((v,i)=>v==null?'':`${p.l+(i+.5)*step},${y(v)}`).filter(Boolean).join(' ');s+=`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.4"/>`});[[lv.support,'support','支撑'],[lv.resistance,'resist','压力']].forEach(q=>s+=`<line class="${q[1]}" x1="${p.l}" y1="${y(q[0])}" x2="${W-p.r}" y2="${y(q[0])}"/><text x="${p.l+6}" y="${y(q[0])-6}" fill="${q[1]==='support'?'#56c99c':'#ef7479'}" font-size="11">${q[2]} ${fmt(q[0])}</text>`);$('#stage').innerHTML=s+'</svg>';const tfName={D:'日K',W:'周K',M:'月K'}[chartTF],span=`${bars[0][0]} 至 ${bars.at(-1)[0]}`;$('#chartHeader').innerHTML=`<div class="chart-title"><h2>${current.name} · ${tfName}</h2><p>${current.code}｜${span}｜MA5 / MA10 / MA20</p></div><div class="metric"><span>最新收盘</span><b>${fmt(current.close)}</b></div><div class="metric"><span>当前支撑</span><b class="pos">${fmt(lv.support)}</b></div><div class="metric"><span>当前压力</span><b class="neg">${fmt(lv.resistance)}</b></div>`;chartContext={tfName,span,support:lv.support,resistance:lv.resistance,ma5:mas[0][0].at(-1),ma10:mas[1][0].at(-1),ma20:mas[2][0].at(-1)};renderAnalysis()}
function renderAnalysis(){const p=current.periods[analysisPeriod],c=chartContext||{tfName:'日K',support:current.support,resistance:current.resistance};$('#analysisCards').innerHTML=`<article class="card"><h4>缠论 · ${p.chan>0?'+':''}${p.chan}</h4><p>${p.chanText}</p></article><article class="card"><h4>蔡森体系 · ${p.tsai>0?'+':''}${p.tsai}</h4><p>${p.tsaiText}</p></article><article class="card"><h4>道氏理论 · ${p.dow>0?'+':''}${p.dow}</h4><p>${p.dowText}；${c.tfName}均线位置 MA5 ${fmt(c.ma5)}、MA10 ${fmt(c.ma10)}、MA20 ${fmt(c.ma20)}。</p></article>`;const stop=p.mode==='等'?`当前为中性结构，观察 ${fmt(c.resistance)} 向上突破或 ${fmt(c.support)} 向下跌破。`:`${p.mode==='多'?'偏多':'偏空'}策略：防守止损 ${fmt(p.defense)}，结构止损 ${fmt(p.structure)}。`;$('#conclusion').innerHTML=`<b>${analysisPeriod}结论：${p.direction}（${p.score>0?'+':''}${p.score}）</b>　当前以${c.tfName}（${c.span||''}）验证：支撑 ${fmt(c.support)}，压力 ${fmt(c.resistance)}。${current.analysis} ${stop}`}
$('#tfTabs').onclick=e=>{if(!e.target.dataset.tf)return;chartTF=e.target.dataset.tf;$('#tfTabs').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b===e.target));renderChart()};$('#analysisTabs').onclick=e=>{if(!e.target.dataset.ap)return;analysisPeriod=e.target.dataset.ap;chartTF=analysisPeriod==='一周'?'D':analysisPeriod==='一个月'?'W':'M';$('#analysisTabs').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b===e.target));$('#tfTabs').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.tf===chartTF));renderChart()};renderScores();renderChart();
</script></body></html>
