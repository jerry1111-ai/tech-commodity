function renderChart(){const bars=current.bars.slice(-90),W=1220,H=470,p={l:55,r:80,t:25,b:38},vals=bars.flatMap(x=>[x[2],x[3]]).concat([current.support,current.resistance]),lo=Math.min(...vals),hi=Math.max(...vals),rg=hi-lo||1,y=v=>p.t+(hi-v)/rg*(H-p.t-p.b),step=(W-p.l-p.r)/bars.length,cw=Math.max(2,step*.55);let s=`<svg viewBox="0 0 ${W} ${H}">`;for(let i=0;i<6;i++){let yy=p.t+i*(H-p.t-p.b)/5,v=hi-i*rg/5;s+=`<line class="grid" x1="${p.l}" y1="${yy}" x2="${W-p.r}" y2="${yy}"/><text class="axis" x="${W-p.r+8}" y="${yy+4}">${fmt(v)}</text>`}bars.forEach((b,i)=>{let x=p.l+(i+.5)*step,up=b[4]>=b[1],co=up?'#ef7479':'#56c99c',t=y(Math.max(b[1],b[4])),bt=y(Math.min(b[1],b[4]));s+=`<line x1="${x}" y1="${y(b[2])}" x2="${x}" y2="${y(b[3])}" stroke="${co}"/><rect x="${x-cw/2}" y="${t}" width="${cw}" height="${Math.max(1,bt-t)}" fill="${up?co:'transparent'}" stroke="${co}"/>`;if(i%15===0)s+=`<text class="axis" x="${x}" y="${H-12}" text-anchor="middle">${b[0].slice(5)}</text>`});[[current.support,'support','支撑'],[current.resistance,'resist','压力']].forEach(q=>{s+=`<line class="${q[1]}" x1="${p.l}" y1="${y(q[0])}" x2="${W-p.r}" y2="${y(q[0])}"/><text x="${p.l+6}" y="${y(q[0])-6}" fill="${q[1]==='support'?'#56c99c':'#ef7479'}" font-size="11">${q[2]} ${fmt(q[0])}</text>`});$('#stage').innerHTML=s+'</svg>';$('#chartHeader').innerHTML=`<div class="chart-title"><h2>${current.name} · 日K线</h2><p>${current.code}｜最近90个交易日</p></div><div class="metric"><span>最新收盘</span><b>${fmt(current.close)}</b></div><div class="metric"><span>支撑位</span><b class="pos">${fmt(current.support)}</b></div><div class="metric"><span>压力位</span><b class="neg">${fmt(current.resistance)}</b></div>`;renderAnalysis()}
function aggregateBars(raw,tf){return tf==='D'?current.barsD:tf==='W'?current.barsW:current.barsM}
function ma(arr,n){return arr.map((_,i)=>i<n-1?null:arr.slice(i-n+1,i+1).reduce((a,b)=>a+b,0)/n)}
function chartLevels(bars){const cur=bars.at(-1)[4],lo=[],hi=[];for(let i=2;i<bars.length-2;i++){if(bars[i][3]<=Math.min(...bars.slice(i-2,i+3).map(x=>x[3])))lo.push(bars[i][3]);if(bars[i][2]>=Math.max(...bars.slice(i-2,i+3).map(x=>x[2])))hi.push(bars[i][2])}return {support:[...lo].reverse().find(x=>x<cur)??Math.min(...bars.slice(-20).map(x=>x[3])),resistance:[...hi].reverse().find(x=>x>cur)??Math.max(...bars.slice(-20).map(x=>x[2]))}}
function renderChart(){const all=aggregateBars(current.bars,chartTF),limit=chartTF==='D'?130:chartTF==='W'?104:60,bars=all.slice(-limit),W=1220,H=470,p={l:55,r:80,t:25,b:38},lv=chartLevels(bars),close=bars.map(x=>x[4]),mas=[[ma(close,5),'#d7b66d'],[ma(close,10),'#6fa8dc'],[ma(close,20),'#b084cc']],vals=bars.flatMap(x=>[x[2],x[3]]).concat([lv.support,lv.resistance]),lo=Math.min(...vals),hi=Math.max(...vals),rg=hi-lo||1,y=v=>p.t+(hi-v)/rg*(H-p.t-p.b),step=(W-p.l-p.r)/bars.length,cw=Math.max(2,step*.55);let s=`<svg viewBox="0 0 ${W} ${H}">`;for(let i=0;i<6;i++){let yy=p.t+i*(H-p.t-p.b)/5,v=hi-i*rg/5;s+=`<line class="grid" x1="${p.l}" y1="${yy}" x2="${W-p.r}" y2="${yy}"/><text class="axis" x="${W-p.r+8}" y="${yy+4}">${fmt(v)}</text>`}bars.forEach((b,i)=>{let x=p.l+(i+.5)*step,up=b[4]>=b[1],co=up?'#ef7479':'#56c99c',t=y(Math.max(b[1],b[4])),bt=y(Math.min(b[1],b[4]));s+=`<line x1="${x}" y1="${y(b[2])}" x2="${x}" y2="${y(b[3])}" stroke="${co}"/><rect x="${x-cw/2}" y="${t}" width="${cw}" height="${Math.max(1,bt-t)}" fill="${up?co:'transparent'}" stroke="${co}"/>`;if(i%Math.ceil(bars.length/7)===0)s+=`<text class="axis" x="${x}" y="${H-12}" text-anchor="middle">${chartTF==='M'?b[0].slice(0,7):b[0].slice(5)}</text>`});mas.forEach(([a,color])=>{let pts=a.map((v,i)=>v==null?'':`${p.l+(i+.5)*step},${y(v)}`).filter(Boolean).join(' ');s+=`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.4"/>`});[[lv.support,'support','支撑'],[lv.resistance,'resist','压力']].forEach(q=>s+=`<line class="${q[1]}" x1="${p.l}" y1="${y(q[0])}" x2="${W-p.r}" y2="${y(q[0])}"/><text x="${p.l+6}" y="${y(q[0])-6}" fill="${q[1]==='support'?'#56c99c':'#ef7479'}" font-size="11">${q[2]} ${fmt(q[0])}</text>`);$('#stage').innerHTML=s+'</svg>';const tfName={D:'日K',W:'周K',M:'月K'}[chartTF],span=`${bars[0][0]} 至 ${bars.at(-1)[0]}`;$('#chartHeader').innerHTML=`<div class="chart-title"><h2>${current.name} · ${tfName}</h2><p>${current.code}｜${span}｜MA5 / MA10 / MA20</p></div><div class="metric"><span>最新收盘</span><b>${fmt(current.close)}</b></div><div class="metric"><span>当前支撑</span><b class="pos">${fmt(lv.support)}</b></div><div class="metric"><span>当前压力</span><b class="neg">${fmt(lv.resistance)}</b></div>`;chartContext={tfName,span,support:lv.support,resistance:lv.resistance,ma5:mas[0][0].at(-1),ma10:mas[1][0].at(-1),ma20:mas[2][0].at(-1)};renderAnalysis()}
function renderAnalysis(){const p=current.periods[analysisPeriod],c=chartContext||{tfName:'日K',support:current.support,resistance:current.resistance};$('#analysisCards').innerHTML=`<article class="card"><h4>缠论 · ${p.chan>0?'+':''}${p.chan}</h4><p>${p.chanText}</p></article><article class="card"><h4>蔡森体系 · ${p.tsai>0?'+':''}${p.tsai}</h4><p>${p.tsaiText}</p></article><article class="card"><h4>道氏理论 · ${p.dow>0?'+':''}${p.dow}</h4><p>${p.dowText}；${c.tfName}均线位置 MA5 ${fmt(c.ma5)}、MA10 ${fmt(c.ma10)}、MA20 ${fmt(c.ma20)}。</p></article>`;const stop=p.mode==='等'?`当前为中性结构，观察 ${fmt(c.resistance)} 向上突破或 ${fmt(c.support)} 向下跌破。`:`${p.mode==='多'?'偏多':'偏空'}策略：防守止损 ${fmt(p.defense)}，结构止损 ${fmt(p.structure)}。`;$('#conclusion').innerHTML=`<b>${analysisPeriod}结论：${p.direction}（${p.score>0?'+':''}${p.score}）</b>　当前以${c.tfName}（${c.span||''}）验证：支撑 ${fmt(c.support)}，压力 ${fmt(c.resistance)}。${current.analysis} ${stop}`}
